# cargo-deny policy for gomoku-httpd-rust.
#
# Run via:   just security      (runs `cargo audit` and `cargo deny check`)
# Or:        cargo deny check
#
# The `allow` list below mirrors the SPDX identifiers actually used by our
# transitive dependency tree as of this writing. New dependencies that
# introduce a license outside this list will fail CI; that is intentional —
# add the license here only after verifying it is compatible with this
# project's MIT license.

[graph]
all-features = true

[licenses]
# Treat unknown / unparseable expressions as a hard error.
confidence-threshold = 0.93

# Allow only the SPDX identifiers actually used by our current
# transitive dependency tree. Adding a dependency that introduces a
# new license is a deliberate decision; let CI flag it so we can
# review whether to expand this list.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

# `zstd-sys` (transitive via actix-web -> actix-http -> zstd) declares its
# license as the legacy SPDX-non-compliant `MIT/Apache-2.0`. Treat that as
# `MIT OR Apache-2.0` since the upstream crate documents both.
[[licenses.clarify]]
crate = "zstd-sys"
expression = "MIT OR Apache-2.0"
license-files = []

# `r-efi` is multi-licensed (MIT OR Apache-2.0 OR LGPL-2.1-or-later). Pick
# the permissive option explicitly so the LGPL clause does not gate us. It
# is only pulled in via the `getrandom` Windows-target chain.
[[licenses.clarify]]
crate = "r-efi"
expression = "MIT OR Apache-2.0"
license-files = []

[bans]
multiple-versions = "allow"   # actix's transitive tree hits this often; not a security issue
wildcards = "deny"

[advisories]
# Vulnerable / unmaintained / unsound advisories are surfaced via `cargo audit`
# as the primary gate. cargo-deny's advisories check is a secondary signal.
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
